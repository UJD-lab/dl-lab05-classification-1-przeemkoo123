name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Report test
      id: report-test
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Report test
        setup-command: ''
        command: find . \( -name "*.ipynb" -o -name "*.py" \) | grep -q .
        timeout: 10
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        REPORT-TEST_RESULTS: "${{steps.report-test.outputs.result}}"
      with:
        runners: report-test
